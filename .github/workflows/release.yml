name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build artifacts
        run: VERSION="${{ steps.version.outputs.value }}" ./scripts/build-release.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Macster ${{ steps.version.outputs.value }}
          files: |
            dist/Macster-${{ steps.version.outputs.value }}.dmg
            dist/Macster-${{ steps.version.outputs.value }}.zip
            dist/checksums.txt
          generate_release_notes: true
