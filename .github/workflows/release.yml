name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        default: 0.1.0

permissions:
  contents: write

jobs:
  build:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Checkout
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Resolve version
        id: version
        shell: bash
        run: |
          echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        run: VERSION="${{ steps.version.outputs.value }}" ./scripts/build-release.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          tag="v$VERSION"
          title="Macster $VERSION"
          notes_file="$(mktemp)"

          cat > "$notes_file" <<NOTES
          Native SwiftUI lid-close awake toggle for macOS.

          Artifacts:
          - Macster-$VERSION.dmg
          - Macster-$VERSION.zip
          - checksums.txt
          NOTES

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --target "$GITHUB_SHA" --title "$title" --notes-file "$notes_file"
          fi

          gh release upload "$tag" \
            "dist/Macster-$VERSION.dmg" \
            "dist/Macster-$VERSION.zip" \
            dist/checksums.txt \
            --clobber
